# Build Docker image on push to main and upload as downloadable tar Artifact
name: Docker image

on:
  push:
    branches:
      - main

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t masc-ahu-dwg2excel-api:latest .

      - name: Save image to tar
        run: |
          docker save masc-ahu-dwg2excel-api:latest -o masc-ahu-dwg2excel-api.tar
          ls -lh masc-ahu-dwg2excel-api.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: masc-ahu-dwg2excel-api-docker-${{ github.sha }}
          path: masc-ahu-dwg2excel-api.tar
          retention-days: 14
          if-no-files-found: error
